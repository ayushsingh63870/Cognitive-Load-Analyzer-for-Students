<!DOCTYPE html>
<html>
<head>
    <title>Reports</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            background: #f5f7fa;
        }

        /* Sidebar (same as dashboard) */
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #3498db;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Dashboard</h2>

    <a href="/dashboard">Home</a>
    <a href="/quiz">Take Quiz</a>
    <a href="/reports">Reports</a>

    {% if session.role == "admin" %}
    <a href="/admin">Admin Panel</a>
    {% endif %}

    <a href="/logout">Logout</a>
</div>

<!-- Main -->
<div class="main">

    <h1>Your Reports</h1>

    <div class="card">

        <table>
            <tr>
                <th>Avg Time</th>
                <th>Accuracy</th>
                <th>Cognitive Load</th>
            </tr>

            {% for row in data %}
            <tr>
                <td>{{ row[2] }}</td>
                <td>{{ (row[3] * 100) | round(2) }}%</td>
                <td>{{ row[4] }}</td>
            </tr>
            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
