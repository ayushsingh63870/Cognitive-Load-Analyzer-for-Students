<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        /* Main Content */
        .main {
            flex: 1;
            padding: 40px;
        }

        .btn {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #2980b9;
        }
        .logo-section {
    text-align: center;
    margin-bottom: 20px;
}

.logo {
    width: 45px;
    height: 45px;
    border-radius: 10px;
    margin-bottom: 5px;
}

.logo-section h3 {
    margin: 0;
    font-size: 16px;
    color: white;
}
    </style>

</head>

<body>

<div class="sidebar">

    <div class="logo-section">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <h3>CLA</h3>
    </div>

    <a href="/quiz">Take Quiz</a>
    <a href="/reports">View Reports</a>

    {% if session.role == "admin" %}
    <a href="/admin">Admin Panel</a>
    {% endif %}

    <a href="/logout">Logout</a>
</div>

<div class="main">
    <h1>Welcome {{ user }}</h1>

    <p>Select an option from the sidebar.</p>

    <a href="/quiz"><button class="btn">Start Quiz</button></a>
</div>

</body>
</html>
